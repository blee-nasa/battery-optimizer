stages:
  - build
  - deploy

before_script:
  - module load singularity_3.7.1

build-wasm:
  stage: build
  script:
    - mkdir -p public
    - >-
      singularity exec docker://emscripten/emsdk:latest
      emcc wasm/calculator.c
      -o public/calculator.js
      -s EXPORTED_FUNCTIONS="['_calculate']"
      -s EXPORTED_RUNTIME_METHODS="['ccall','cwrap']"
      -s MODULARIZE=1
      -s EXPORT_NAME="createCalculatorModule"
      -s ALLOW_MEMORY_GROWTH=1
      -O2
  artifacts:
    paths:
      - public/calculator.js
      - public/calculator.wasm

build-frontend:
  stage: build
  needs:
    - build-wasm
  script:
    - >-
      singularity exec docker://node:18
      sh -c "npm install && npm run build"
  artifacts:
    paths:
      - dist

pages:
  stage: deploy
  needs:
    - build-frontend
  script:
    - mv dist public
  artifacts:
    paths:
      - public
