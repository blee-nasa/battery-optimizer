stages:
  - diagnose

check-runner:
  stage: diagnose
  script:
    - echo "--- OS ---"
    - uname -a || true
    - cat /etc/os-release 2>/dev/null || true
    - echo "--- Docker ---"
    - docker --version || echo "docker not found"
    - echo "--- Node ---"
    - node --version || echo "node not found"
    - npm --version || echo "npm not found"
    - echo "--- Python ---"
    - python3 --version || python --version || echo "python not found"
    - echo "--- Available module envs ---"
    - module avail 2>&1 | head -40 || echo "module command not found"
    - echo "--- PATH ---"
    - echo "$PATH"
